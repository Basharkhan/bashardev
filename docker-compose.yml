services:
  postgres:
    image: postgres:16-alpine
    container_name: bashardev-postgres
    environment:
      POSTGRES_DB: bashardev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bashardev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: bashardev-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bashardev
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      JWT_SECRET: change-me-to-a-long-random-secret-key-at-least-32-bytes
      JWT_EXPIRATION_MINUTES: 120
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@bashardev.local
      ADMIN_PASSWORD: admin123456
      ADMIN_FIRST_NAME: Bashar
      ADMIN_LAST_NAME: Admin
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
