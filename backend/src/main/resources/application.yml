spring:
  application:
    name: bashardev-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bashardev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  bootstrap:
    admin:
      username: ${ADMIN_USERNAME:admin}
      email: ${ADMIN_EMAIL:admin@bashardev.local}
      password: ${ADMIN_PASSWORD:admin123456}
      first-name: ${ADMIN_FIRST_NAME:Bashar}
      last-name: ${ADMIN_LAST_NAME:Admin}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads/}
    max-image-size-bytes: ${MAX_IMAGE_SIZE_BYTES:5242880}

logging:
  level:
    org.springframework.security: INFO
