spring:
  datasource:
    url: jdbc:h2:mem:bashardev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  jwt:
    secret: test-secret-key-that-is-long-enough
    expiration-minutes: 120
  bootstrap:
    admin:
      username: admin
      email: admin@example.com
      password: admin123456
      first-name: Test
      last-name: Admin
  storage:
    upload-dir: ./uploads-test/
    max-image-size-bytes: 5242880
